name: Update focus-android

on:
  schedule:
    - cron: "5 15 * * 1,4"
  workflow_dispatch:

jobs:
  prepare:
    uses: ./.github/workflows/_prepare.yaml

  update:
    needs: prepare
    uses: ./.github/workflows/_update.yaml
    with:
      project: focus-android
      branches: ${{ needs.prepare.outputs.branches }}
      path: ${{ needs.prepare.outputs.path }}

  cleanup:
    needs: update
    uses: ./.github/workflows/_cleanup.yaml
    with:
      project: focus-android
      token: ${{ secrets.ANDROID_GITHUB_TOKEN }}
